<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TYESO Indonesia Official Store - Preview Your Text Here</title>

  <script type="importmap">
  {
    "imports": {
      "supabase": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm",
      "jspdf": "https://cdn.jsdelivr.net/npm/jspdf@2.5.1/+esm"

  <style>
    body{font-family:sans-serif;margin:0;background:#f5f5f5;color:#111}
.wrap{max-width:980px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:20px;margin-bottom:16px}
    h1{font-size:20px;margin:0 0 12px} h2{font-size:16px;margin:0 0 10px}
    label{display:block;margin:10px 0 4px;font-size:14px}
    input,select,button{width:100%;box-sizing:border-box;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff}
.row{display:flex;gap:10px}.row>*{flex:1}.hidden{display:none}
    #canvas{width:100%;height:auto;border:1px solid #eee;border-radius:8px;margin-top:12px;background:#fafafa}
.hint{font-size:12px;color:#666;margin-top:6px}
.inline{display:flex;align-items:center;gap:8px}.inline input[type="range"]{flex:1}
.btn{cursor:pointer}.btn.secondary{background:#f3f3f3}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.muted{color:#666;font-size:12px}
    @media (max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="authCard">
      <h1>TYESO Indonesia Official Store - Preview Your Text Here</h1>
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
      <div class="row">
        <button id="signin" class="btn">Login</button>
        <button id="signup" class="btn secondary">Sign up</button>
      </div>
      <div class="hint">Login to access the preview form.</div>
    </div>

    <div class="card hidden" id="adminCard">
      <h2>Admin — Upload Product Images</h2>
      <input id="fileInput" type="file" accept="image/*" multiple />
      <div class="row" style="margin-top:8px">
        <button id="uploadBtn" class="btn">Upload</button>
        <button id="refreshProducts" class="btn secondary">Refresh list</button>
      </div>
      <div class="hint" id="adminStatus"></div>
    </div>

    <div class="card hidden" id="appCard">
      <div class="row" style="align-items:center;justify-content:space-between">
        <div>Logged in as <b id="userEmail"></b></div>
        <button id="signout" class="btn secondary" style="width:auto;padding:8px 12px">Sign out</button>
      </div>

      <div class="grid" style="margin-top:8px">
        <div>
          <label>Salesperson name</label>
          <input id="salesperson" type="text" placeholder="e.g. Rina" />
          <label>Customer name</label>
          <input id="custName" type="text" placeholder="e.g. Budi" />
          <label>Customer phone</label>
          <input id="custPhone" type="tel" placeholder="08xxxxxxxxxx" />
          <label>Due date</label>
          <input id="dueDate" type="date" />
          <label>Product (searchable)</label>
          <input id="productSearch" type="text" placeholder="type to filter..." />
          <select id="product"></select>
          <div class="hint">Product list loads from Supabase Storage bucket <code>products</code>.</div>
        </div>

        <div>
          <label>Text for preview</label>
          <input id="previewText" type="text" placeholder="Your Text" />
          <label>Font type</label>
          <select id="fontFamily"></select>
          <label>Font size</label>
          <div class="inline">
            <input id="fontSize" type="range" min="12" max="300" value="120" />
            <span id="fontSizeVal">120</span>
          </div>
          <label>Text direction</label>
          <select id="direction">
            <option value="horizontal">Horizontal</option>
            <option value="vertical-down">Top-down</option>
            <option value="vertical-up">Bottom-up</option>
          </select>
          <div class="row">
            <div>
              <label>Vertical alignment</label>
              <select id="valign">
                <option value="top">Top</option>
                <option value="middle" selected>Middle</option>
                <option value="bottom">Bottom</option>
              </select>
            </div>
            <div>
              <label>Vertical offset (-300..300)</label>
              <div class="inline">
                <input id="valignOffset" type="range" min="-300" max="300" value="0" />
                <span id="valignOffsetVal">0</span>
              </div>
            </div>
          </div>
          <div class="row">
            <button id="resetAlign" class="btn secondary">Reset alignment</button>
            <div></div>
          </div>
        </div>
      </div>

      <canvas id="canvas" width="1080" height="1350"></canvas>
      <img id="bg" alt="" style="display:none" crossorigin="anonymous" />
      <div class="row" style="margin-top:10px">
        <button class="btn" id="downloadPng">Save as PNG</button>
        <button class="btn secondary" id="downloadPdf">Download PDF</button>
        <button class="btn" id="submitBtn">Submit</button>
        <span class="muted">Filename: <code id="fname"></code></span>
      </div>
      <div class="hint" id="status"></div>
    </div>

    <!-- Recent submissions: hidden until login -->

      </div>

    </div>

<script type="module">

  const productSel = document.getElementById('product');

  const TEXT_COLOR = 'rgb(128,128,128)';

  const fontDefs = [
    ['AbramoScript', 'fonts/AbramoScript.otf', { format: 'opentype' }],
    ['MagnoliaScript', 'fonts/MagnoliaScript.otf', { format: 'opentype' }],
    ['NexaScript', 'fonts/NexaScript.otf', { format: 'opentype' }],

    ['AdleryProSwash', 'fonts/AdleryProSwash.ttf', { format: 'truetype' }],
    ['AlexBrush', 'fonts/AlexBrush-Regular.ttf', { format: 'truetype' }],
    ['BelweCondensed', 'fonts/Belwe.otf', { format: 'opentype' }],
    ['BerkshireSwash', 'fonts/BerkshireSwash-Regular.ttf', { format: 'truetype' }],
    ['GloriaHallelujah', 'fonts/GloriaHallelujah.ttf', { format: 'truetype' }],
    ['HughIsLife', 'fonts/Hugh-is-Life.ttf', { format: 'truetype' }],
    ['LifelogoEasy', 'fonts/Lifelogo-Easy.ttf', { format: 'truetype' }],
    ['MoonTime', 'fonts/MoonTime-Regular.ttf', { format: 'truetype' }],
    ['PlayfairDisplay', 'fonts/PlayfairDisplay-Black.ttf', { weight: '900', format: 'truetype' }],
    ['Poppins', 'fonts/Poppins-Black.ttf', { weight: '900', format: 'truetype' }],
    ['Roboto', 'fonts/Roboto-Black.ttf', { weight: '900', format: 'truetype' }],
    ['RumblebraveScript', 'fonts/Rumble-brave-script-Italic.ttf', { style: 'italic', format: 'truetype' }]
  ];

  fontFamilySel.innerHTML = fontDefs.map(([name]) => `<option value="${name}">${name}</option>`).join('');
  Promise.allSettled(fontDefs.map(([name, url, options = {}]) =>
    new FontFace(name, `url(${url})`, options).load().then(f => { document.fonts.add(f); return name; }).catch(e=>{console.warn(e);})
  )).finally(()=>draw());

  let productItems = []; // {name, path, url}

  function getSelItem(){
    return productItems.find(p => p.path === productSel.value) || null;
  }
  function validateForm(){
    const errors = [];
    if(!(salesperson.value||'').trim()) errors.push('Salesperson name');
    if(!(custName.value||'').trim()) errors.push('Customer name');
    if(!(custPhone.value||'').trim()) errors.push('Customer phone');
    if(!dueDate.value) errors.push('Due date');
    if(!getSelItem()) errors.push('Product');
    if(!(previewText.value||'').trim()) errors.push('Text for preview');
    if(!fontFamilySel.value) errors.push('Font type');
    if(!directionSel.value) errors.push('Text direction');
    if(!valignSel.value) errors.push('Vertical alignment');
    return errors;
  }
  submitBtn.disabled = true;
  function updateSubmitState(){
    const missing = validateForm();
    submitBtn.disabled = missing.length > 0;

  ['input','change'].forEach(evt=>{
    [salesperson,custName,custPhone,dueDate,productSel,previewText,fontFamilySel,directionSel,valignSel,valignOffset]
   .forEach(el=> el.addEventListener(evt, updateSubmitState));
  });

  async function loadProducts(){
    productSel.innerHTML = '';
    const { data, error } = await sb.storage.from(BUCKET).list('', { limit: 1000, sortBy: { column: 'name', order: 'asc' }});
    if(error){ console.warn(error); return; }
    const files = (data||[]).filter(x => x.name &&!x.name.endsWith('/'));
    productItems = files.map(f => {
      const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(f.name);
      const name = f.name.replace(/\.[^.]+$/, '').replace(/[-_]+/g,' ');
      return { name, path: f.name, url: pub.publicUrl };
    });
    renderProducts(productSearch.value);
    if(productItems[0]){
      bg.crossOrigin = 'anonymous';
      bg.src = productItems[0].url + '?v=' + Date.now();
      updateSubmitState();
    }
  }
  function renderProducts(filter=''){
    const q = filter.trim().toLowerCase();
    const list = productItems.filter(p => p.name.toLowerCase().includes(q));
    productSel.innerHTML = list.map(p => `<option value="${p.path}">${p.name}</option>`).join('');
    if(list[0]){
      const first = productItems.find(p=>p.path===list[0].path);
      if(first){
        bg.crossOrigin = 'anonymous';
        bg.src = first.url + (first.url.includes('?')? '&' : '?') + 'v=' + Date.now();
      }
    }
  }
  productSearch.addEventListener('input', ()=>renderProducts(productSearch.value));
  productSel.addEventListener('change', ()=>{
    const item = productItems.find(p=>p.path===productSel.value);
    if(item){
      bg.crossOrigin = 'anonymous';
      bg.src = item.url + (item.url.includes('?')? '&' : '?') + 'v=' + Date.now();
    }
  });

  function baseY(){
    const h = canvas.height;
    const align = valignSel.value;
    if(align === 'top') return 120;
    if(align === 'bottom') return h - 120;
    return h/2;
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (bg.complete && bg.naturalWidth) {
      const r = Math.max(canvas.width / bg.naturalWidth, canvas.height / bg.naturalHeight);
      const w = bg.naturalWidth * r, h = bg.naturalHeight * r;
      const x = (canvas.width - w) / 2, y = (canvas.height - h) / 2;
      ctx.drawImage(bg, x, y, w, h);
    } else {
      ctx.fillStyle = '#ececec'; ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    const txt = (previewText.value || '').trim() || 'Your Text';
    const family = fontFamilySel.value || 'Poppins';
    const size = parseInt(fontSize.value,10) || 120;
    const dir = directionSel.value;
    const y = baseY() + parseInt(valignOffset.value,10);

    ctx.save();
    ctx.fillStyle = TEXT_COLOR;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `${size}px ${family}`;

    if (dir === 'horizontal') {
      ctx.fillText(txt, canvas.width/2, y);
    } else {
      ctx.translate(canvas.width/2, y);
      ctx.rotate(dir === 'vertical-down'? Math.PI/2 : -Math.PI/2);
      ctx.fillText(txt, 0, 0);
    }
    ctx.restore();
  }
  [previewText, fontFamilySel, fontSize, directionSel, valignSel, valignOffset].forEach(el=>{
    el.addEventListener('input', ()=>{ fontSizeVal.textContent = fontSize.value; valignOffsetVal.textContent = valignOffset.value; draw(); });
  });
  bg.addEventListener('load', draw);
  resetAlign.addEventListener('click', ()=>{ valignSel.value='middle'; valignOffset.value=0; valignOffsetVal.textContent='0'; draw(); });

  downloadPng.addEventListener('click', ()=>{
    const a = document.createElement('a');
    a.download = (fnameEl?.textContent || (previewText.value || 'preview') + '.png');
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  downloadPdfBtn.addEventListener('click', async ()=>{
    const { jsPDF } = window.jspdf;
    const selItem = getSelItem();
    if(!selItem){ alert('Please select a product.'); return; }

    const pdf = new jsPDF({ unit: 'pt', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const margin = 40;
    let y = 60;

    pdf.setFontSize(16);
    pdf.text('TYESO Indonesia - Order Preview', margin, y);
    y += 24;

    pdf.setFontSize(11);
    const lines = [
      `Salesperson: ${ (salesperson.value || '-').trim() }`,
      `Customer: ${ (custName.value || '-').trim() } | Phone: ${ (custPhone.value || '-').trim() }`,

      `Product: ${ selItem.name }`,
      `Text: ${ (previewText.value || 'Your Text').trim() }`,
      `Font: ${ fontFamilySel.value || 'Poppins' } Size: ${ parseInt(fontSize.value,10) || 120 }`,
      `Direction: ${ directionSel.value } V-Align: ${ valignSel.value } Offset: ${ parseInt(valignOffset.value,10) || 0 }`,
      `Text color: ${ TEXT_COLOR }`
    ];
    lines.forEach(l => { pdf.text(l, margin, y); y += 18; });

    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const imgW = pageW - margin*2;
    const imgH = imgW * (canvas.height / canvas.width);
    pdf.addImage(dataUrl, 'JPEG', margin, y + 10, imgW, imgH, undefined, 'FAST');

    const base = (previewText.value || 'preview').trim().replace(/\s+/g,'_').slice(0,40);
    const ts = new Date().toISOString().replace(/[:.]/g,'-');

  submitBtn.addEventListener('click', async ()=>{

      updateSubmitState();

  function fmtDate(d){
    try { return new Date(d).toLocaleString(); } catch { return d || '-'; }
  }

  // --- text-only PDF helpers (renders ONLY the preview text, using font/size/direction) ---
  const FONT_FILE_MAP = {
    Poppins: 'fonts/Poppins-Black.ttf',
    Roboto: 'fonts/Roboto-Black.ttf',
    PlayfairDisplay: 'fonts/PlayfairDisplay-Black.ttf',
    // add more mappings if you want exact custom fonts in the text-only PDF
  };
  async function ensurePdfFont(pdf, family){
    const file = FONT_FILE_MAP[family];
    if (!file) { pdf.setFont('helvetica', 'normal'); return; }
    try {
      const res = await fetch(file);
      const buf = await res.arrayBuffer();
      const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
      const vfsName = file.split('/').pop();
      pdf.addFileToVFS(vfsName, b64);
      pdf.addFont(vfsName, family, 'normal');
      pdf.setFont(family, 'normal');
    } catch {
      pdf.setFont('helvetica', 'normal');
    }
  }
  function parseRgb(rgbStr){
    const m = /rgb\((\d+),\s*(\d+),\s*(\d+)\)/i.exec(rgbStr || '');
    return m? [parseInt(m[1],10), parseInt(m[2],10), parseInt(m[3],10)] : [128,128,128];
  }
  async function makeTextOnlyPdfUrl(r){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'pt', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();

    await ensurePdfFont(pdf, r.font_family || 'Poppins');
    const fontSizePt = Math.max(8, Math.min(300, Number(r.font_size) || 120));
    pdf.setFontSize(fontSizePt);
    const [cr,cg,cb] = parseRgb(r.text_color || 'rgb(128,128,128)');
    pdf.setTextColor(cr,cg,cb);

    const text = (r.preview_text || 'Your Text').trim();
    const maxWidth = pageW * 0.9; // keep margins
    const lines = pdf.splitTextToSize(text, maxWidth);
    const lineHeight = fontSizePt * 1.2;

    const dir = (r.direction || 'horizontal');
    if (dir === 'horizontal') {
      const blockHeight = lines.length * lineHeight;
      let startY = (pageH - blockHeight) / 2 + lineHeight*0.35; // visually center
      lines.forEach((line, i) => {
        const w = pdf.getTextWidth(line);
        const x = (pageW - w) / 2;
        pdf.text(line, x, startY + i*lineHeight);
      });
    } else {
      // vertical: rotate the whole page context and draw centered lines
      const angle = dir === 'vertical-down'? 90 : -90;
      pdf.saveGraphicsState();
      pdf.setCurrentTransformationMatrix(new pdf.Matrix(1,0,0,1,0,0));
      pdf.translate(pageW/2, pageH/2);
      pdf.rotate(angle);
      // after rotation, draw lines centered at (0,0)
      const blockHeight = lines.length * lineHeight;
      let startY = -blockHeight/2 + lineHeight*0.35;
      lines.forEach((line, i) => {
        const w = pdf.getTextWidth(line);
        pdf.text(line, -w/2, startY + i*lineHeight);
      });
      pdf.restoreGraphicsState();
    }
    return pdf.output('bloburl');
  }

  async function loadRecent(){
    const { data: { user } } = await sb.auth.getUser();
    if(!user){ recentList.textContent = 'Sign in to see your recent submissions.'; return; }
    recentList.textContent = 'Loading…';
    const { data, error } = await sb
   .from('orders')
   .select('id, created_at, product_name, preview_text, font_family, font_size, direction, valign, valign_offset, due_date, customer_name, customer_phone, salesperson, filename, text_color')
   .eq('user_id', user.id)
   .order('created_at', { ascending: false })
   .limit(3);
    if(error){ recentList.textContent = 'Failed to load: ' + error.message; return; }
    if(!data ||!data.length){ recentList.textContent = 'No submissions yet.'; return; }

    recentList.innerHTML = data.map(r => `
      <div style="padding:10px;border:1px solid #eee;border-radius:8px;margin-top:8px" data-id="${r.id}">
        <div style="font-size:13px;color:#666">${fmtDate(r.created_at)}</div>
        <div><b>${r.product_name || '-'}</b> — “${(r.preview_text||'').replace(/</g,'&lt;')}”</div>
        <div class="muted">
          ${r.font_family || 'Poppins'} ${r.font_size || ''} • ${r.direction} • ${r.valign} (${r.valign_offset || 0})
          • Due: ${r.due_date || '-'} • ${r.customer_name || '-'} (${r.customer_phone || '-'}) • Sales: ${r.salesperson || '-'}
        </div>
        <div class="muted">File: ${r.filename || '-'}</div>

        <div style="margin-top:8px">
          <label class="muted" style="display:block;margin-bottom:4px">Link for text-only</label>
          <div class="inline">
            <input class="textonly-link" type="text" readonly placeholder="Generating link…" style="font-size:12px" />
            <button class="btn secondary copy-link" style="width:auto;padding:8px 12px">Copy link</button>
          </div>
        </div>
      </div>
    `).join('');

    const cards = recentList.querySelectorAll('[data-id]');
    cards.forEach(async (card) => {
      const id = card.getAttribute('data-id');
      const input = card.querySelector('.textonly-link');
      const btn = card.querySelector('.copy-link');
      try {
        const { data: rows, error } = await sb.from('orders').select('*').eq('id', id).limit(1);
        if (error ||!rows ||!rows.length) throw new Error('load failed');
        const url = await makeTextOnlyPdfUrl(rows[0]);
        input.value = url;
        btn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(input.value);
            btn.textContent = 'Copied!';
            setTimeout(()=> btn.textContent = 'Copy link', 1200);
          } catch {
            input.select(); document.execCommand('copy');
          }
        });
      } catch (e) {
        input.value = '';
        input.placeholder = 'Could not generate link';
        btn.disabled = true;
      }
    });
  }

  function clearForm(){
    salesperson.value = '';
    custName.value = '';
    custPhone.value = '';
    dueDate.value = '';
    productSearch.value = '';
    previewText.value = '';
    fontFamilySel.value = 'Poppins';
    fontSize.value = 120; fontSizeVal.textContent = '120';
    directionSel.value = 'horizontal';
    valignSel.value = 'middle';
    valignOffset.value = 0; valignOffsetVal.textContent = '0';
    renderProducts('');
    draw();
    updateSubmitState();
    statusEl.textContent = 'Form cleared.';
    fnameEl.textContent = '';
  }
  clearFormBtn.addEventListener('click', clearForm);

  async function isAdmin(userId){
    const { data } = await sb.from('profiles').select('is_admin').eq('user_id', userId).maybeSingle();
    return!!data?.is_admin;
  }

  async function refresh(){
    const { data: { user } } = await sb.auth.getUser();
    if(user){
      authCard.classList.add('hidden');
      appCard.classList.remove('hidden');
      recentCard.classList.remove('hidden');
      userEmailSpan.textContent = user.email || '';
      await loadProducts();
      if (await isAdmin(user.id)) {
        adminCard.classList.remove('hidden');
      } else {
        adminCard.classList.add('hidden');
      }
      draw();
      await loadRecent();
    }else{
      authCard.classList.remove('hidden');
      appCard.classList.add('hidden');
      adminCard.classList.add('hidden');
      recentCard.classList.add('hidden');
    }
  }

  signInBtn.addEventListener('click', async ()=>{ signInBtn.disabled=true; const { error } = await sb.auth.signInWithPassword({ email: emailInput.value.trim(), password: passwordInput.value }); if(error) alert(error.message); signInBtn.disabled=false; refresh(); });
  signUpBtn.addEventListener('click', async ()=>{ signUpBtn.disabled=true; const { error } = await sb.auth.signUp({ email: emailInput.value.trim(), password: passwordInput.value }); if(error) alert(error.message); else alert('Check your email for confirmation (if enabled).'); signUpBtn.disabled=false; refresh(); });
  signOutBtn.addEventListener('click', async ()=>{ await sb.auth.signOut(); refresh(); });

  uploadBtn.addEventListener('click', async ()=>{
    const files = fileInput.files; if (!files ||!files.length) { return; }
    adminStatus.textContent = 'Uploading…';
    for(const f of files){
      const path = `${Date.now()}-${f.name}`.replace(/\s+/g,'_');
      const { error } = await sb.storage.from(BUCKET).upload(path, f, { upsert: false });
      if(error){ console.error(error); adminStatus.textContent = 'Upload failed: ' + error.message; return; }
    }
    adminStatus.textContent = 'Done.'; fileInput.value = ''; await loadProducts();
  });
  refreshProducts.addEventListener('click', loadProducts);

  refresh();
</script>
</body>
</html>
