<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Text Preview</title>
  <style>
    body{font-family:sans-serif;margin:0;padding:1rem;max-width:600px;margin:auto}
    label{display:block;margin:.5rem 0.2rem}
    input,select,button{width:100%;padding:.5rem;margin-bottom:.5rem}
    canvas{width:100%;border:1px solid #ccc;margin-top:1rem}
   .row{display:flex;gap:.5rem}
   .row>*{flex:1}
  </style>
  <!-- your fonts -->
  <style>
    @font-face{font-family:'Above-the-beyond-script';src:url('fonts/Above-the-beyond-script.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'AbramoScript';src:url('fonts/AbramoScript.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'AdleryProSwash';src:url('fonts/AdleryProSwash.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'AlexBrush-Regular';src:url('fonts/AlexBrush-Regular.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'Belwe-Condensed';src:url('fonts/Belwe-Condensed.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'BerkshireSwash-Regular';src:url('fonts/BerkshireSwash-Regular.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'PlayfairDisplay-Black';src:url('fonts/PlayfairDisplay-Black.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'Poppins-ExtraBold';src:url('fonts/Poppins-ExtraBold.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'Roboto-Black';src:url('fonts/Roboto-Black.woff2') format('woff2');font-display:swap}
    @font-face{font-family:'White-Apricot';src:url('fonts/White-Apricot.woff2') format('woff2');font-display:swap}
    /* add the rest of your 27 fonts the same way */
  </style>
</head>
<body>
  <h2>Preview Generator</h2>
  <div id="auth">
    <input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password">
    <button id="login">Login / Sign up</button>
  </div>

  <div id="app" style="display:none">
    <label>Customer name</label><input id="custName">
    <label>Phone</label><input id="custPhone">
    <label>Due date</label><input id="dueDate" type="date">
    <label>Search product</label><input id="search" placeholder="Type product name">
    <div id="productList"></div>
    <canvas id="cv" width="800" height="800"></canvas>
    <label>Text</label><input id="txt" placeholder="Type preview text">
    <label>Font</label><select id="font">
      <option>AdleryPro</option><option>AlexBrush</option><!-- add the rest -->
    </select>
    <label>Size</label><input id="size" type="range" min="8" max="200" value="24"><span id="sizeVal">24</span>
    <label>Direction</label><select id="dir"><option>horizontal</option><option>vertical-down</option><option>vertical-up</option></select>
    <label>Vertical align</label><select id="valign"><option>top</option><option selected>middle</option><option>bottom</option></select>
    <label>Vertical offset</label><input id="voff" type="range" min="-300" max="300" value="0">
    <div class="row"><button id="reset">Reset</button><button id="download">Download PNG</button></div>
    <div class="row"><button id="save">Save draft</button><button id="submit">Submit (PDF)</button></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
<script>
  const SUPABASE_URL = "https://hbrcqqchtbinpmzqifxq.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhicmNxcWNodGJpbnBtenFpZnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjk3NTcsImV4cCI6MjA4OTc0NTc1N30.gJZCBSgW2dAv76qLJ8o_5aNe64nAgP-JpysicuLPNtA";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const authSection = document.getElementById('auth');
  const appSection = document.getElementById('app');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const signInBtn = document.getElementById('signin');
  const signUpBtn = document.getElementById('signup');
  const signOutBtn = document.getElementById('signout');
  const userEmailSpan = document.getElementById('userEmail');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const bg = document.getElementById('bg');
  const textInput = document.getElementById('text');
  const textColorInput = document.getElementById('textColor');
  const downloadBtn = document.getElementById('download');

  const font = new FontFace('AdleryPro', 'url(fonts/AdleryPro.woff2)');
  font.load().then(f => document.fonts.add(f)).then(draw);

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    ctx.fillStyle = textColorInput.value;
    ctx.font = '96px "AdleryPro", cursive';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(textInput.value || 'your name', canvas.width/2, canvas.height/2);
  }
  bg.onload = draw;
  textInput.addEventListener('input', draw);
  textColorInput.addEventListener('input', draw);

  downloadBtn.addEventListener('click', ()=>{
    const a = document.createElement('a');
    a.download = 'preview.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  async function refresh(){
    const { data: { user } } = await supabase.auth.getUser();
    if(user){
      authSection.classList.add('hidden');
      appSection.classList.remove('hidden');
      userEmailSpan.textContent = user.email || '';
    }else{
      authSection.classList.remove('hidden');
      appSection.classList.add('hidden');
    }
  }
  signInBtn.addEventListener('click', async ()=>{
    signInBtn.disabled = true;
    const { error } = await supabase.auth.signInWithPassword({
      email: emailInput.value.trim(),
      password: passwordInput.value
    });
    if(error) alert(error.message);
    signInBtn.disabled = false;
    refresh();
  });
  signUpBtn.addEventListener('click', async ()=>{
    signUpBtn.disabled = true;
    const { error } = await supabase.auth.signUp({
      email: emailInput.value.trim(),
      password: passwordInput.value
    });
    if(error) alert(error.message);
    else alert('Check your email for confirmation (if enabled).');
    signUpBtn.disabled = false;
    refresh();
  });
  signOutBtn.addEventListener('click', async ()=>{
    await supabase.auth.signOut();
    refresh();
  });
  refresh();
</script>
</body>
</html>
