<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview App</title>
  <script type="importmap">
  {
    "imports": {
      "supabase": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    }
  }
  </script>
  <style>
    body{font-family:sans-serif;display:flex;min-height:100vh;margin:0;align-items:center;justify-content:center;background:#f5f5f5}
    .card{background:#fff;padding:24px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);width:100%;max-width:720px}
    .hidden{display:none}
    label{display:block;margin:8px 0 4px}
    input,button{padding:10px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box}
    button{cursor:pointer;margin-top:8px}
    #canvas{width:100%;height:auto;border:1px solid #eee;border-radius:8px;margin-top:12px}
    .row{display:flex;gap:8px}
    .row>*{flex:1}
  </style>
</head>
<body>
  <div class="card">
    <div id="auth">
      <h2>Login or Sign up</h2>
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
      <div class="row">
        <button id="signin">Login</button>
        <button id="signup">Sign up</button>
      </div>
    </div>

    <div id="app" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>Logged in as <span id="userEmail"></span></div>
        <button id="signout" style="width:auto;padding:8px 12px">Sign out</button>
      </div>
      <label>Text</label>
      <input id="text" type="text" placeholder="your name" />
      <label>Text color</label>
      <input id="textColor" type="color" value="#ffffff" />
      <canvas id="canvas" width="1080" height="1350"></canvas>
      <img id="bg" src="fonts/bg.jpg" alt="" style="display:none">
      <button id="download">Download PNG</button>
    </div>
  </div>

<script type="module">
  import { createClient } from 'supabase';

  const SUPABASE_URL = "https://hbrcqqchtbinpmzqifxq.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhicmNxcWNodGJpbnBtenFpZnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjk3NTcsImV4cCI6MjA4OTc0NTc1N30.gJZCBSgW2dAv76qLJ8o_5aNe64nAgP-JpysicuLPNtA";
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const authSection = document.getElementById('auth');
  const appSection = document.getElementById('app');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const signInBtn = document.getElementById('signin');
  const signUpBtn = document.getElementById('signup');
  const signOutBtn = document.getElementById('signout');
  const userEmailSpan = document.getElementById('userEmail');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const bg = document.getElementById('bg');
  const textInput = document.getElementById('text');
  const textColorInput = document.getElementById('textColor');
  const downloadBtn = document.getElementById('download');

  const fontDefs = [
    ['AbramoScript', 'fonts/AbramoScript.otf', { format: 'opentype' }],
    ['MagnoliaScript', 'fonts/MagnoliaScript.otf', { format: 'opentype' }],
    ['NexaScript', 'fonts/NexaScript.otf', { format: 'opentype' }],
    ['WhiteApricot', 'fonts/White-Apricot.otf', { format: 'opentype' }],
    ['AboveTheBeyond', 'fonts/Above-the-beyond-script.ttf', { format: 'truetype' }],
    ['AdleryProSwash', 'fonts/AdleryProSwash.ttf', { format: 'truetype' }],
    ['AlexBrush', 'fonts/AlexBrush-Regular.ttf', { format: 'truetype' }],
    ['BelweCondensed', 'fonts/Belwe.ttf', { format: 'truetype' }],
    ['BerkshireSwash', 'fonts/BerkshireSwash-Regular.ttf', { format: 'truetype' }],
    ['GloriaHallelujah', 'fonts/GloriaHallelujah.ttf', { format: 'truetype' }],
    ['HughIsLife', 'fonts/Hugh-is-Life.ttf', { format: 'truetype' }],
    ['LifelogoEasy', 'fonts/Lifelogo-Easy.ttf', { format: 'truetype' }],
    ['MoonTime', 'fonts/MoonTime-Regular.ttf', { format: 'truetype' }],
    ['PlayfairDisplay', 'fonts/PlayfairDisplay-Black.ttf', { weight: '900', format: 'truetype' }],
    ['Poppins', 'fonts/Poppins-Black.ttf', { weight: '900', format: 'truetype' }],
    ['Roboto', 'fonts/Roboto-Black.ttf', { weight: '900', format: 'truetype' }],
    ['RumblebraveScript', 'fonts/Rumble-brave-script-Italic.ttf', { style: 'italic', format: 'truetype' }]
  ];

  Promise.allSettled(
    fontDefs.map(([name, url, options = {}]) =>
      new FontFace(name, `url(${url})`, options).load()
        .then(f => { document.fonts.add(f); return name; })
        .catch(e => { console.warn(`Failed to load font ${name} from ${url}:`, e); throw new Error(`Font load error for ${name}`); })
    )
  ).finally(() => { draw(); });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (bg.complete && bg.naturalWidth) {
      const r = Math.max(canvas.width / bg.naturalWidth, canvas.height / bg.naturalHeight);
      const w = bg.naturalWidth * r, h = bg.naturalHeight * r;
      const x = (canvas.width - w) / 2, y = (canvas.height - h) / 2;
      ctx.drawImage(bg, x, y, w, h);
    } else {
      ctx.fillStyle = '#eee';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    const txt = (textInput.value || '').trim() || 'Your Text';
    ctx.fillStyle = textColorInput.value || '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    let y = 120;
    const step = 100;

    const lines = [
      ['80px AbramoScript', y],
      ['60px AlexBrush', y+=step],
      ['900 70px PlayfairDisplay', y+=step],
      ['900 50px Poppins', y+=step],
      ['italic 70px RumblebraveScript', y+=step],
      ['normal 40px MagnoliaScript', y+=step],
      ['60px BerkshireSwash', y+=step],
      ['50px GloriaHallelujah', y+=step],
      ['70px MoonTime', y+=step],
      ['900 60px Roboto', y+=step]
    ];

    lines.forEach(([font, yy], i) => {
      ctx.font = font;
      ctx.fillText(txt, canvas.width / 2, i===0?120:yy);
    });
  }

  textInput.addEventListener('input', draw);
  textColorInput.addEventListener('input', draw);
  bg.addEventListener('load', draw);

  downloadBtn.addEventListener('click', ()=>{
    const a = document.createElement('a');
    a.download = 'preview.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  async function refresh(){
    const { data: { user } } = await sb.auth.getUser();
    if(user){
      authSection.classList.add('hidden');
      appSection.classList.remove('hidden');
      userEmailSpan.textContent = user.email || '';
      draw();
    }else{
      authSection.classList.remove('hidden');
      appSection.classList.add('hidden');
    }
  }
  signInBtn.addEventListener('click', async ()=>{
    signInBtn.disabled = true;
    const { error } = await sb.auth.signInWithPassword({ email: emailInput.value.trim(), password: passwordInput.value });
    if(error) alert(error.message);
    signInBtn.disabled = false;
    refresh();
  });
  signUpBtn.addEventListener('click', async ()=>{
    signUpBtn.disabled = true;
    const { error } = await sb.auth.signUp({ email: emailInput.value.trim(), password: passwordInput.value });
    if(error) alert(error.message);
    else alert('Check your email for confirmation (if enabled).');
    signUpBtn.disabled = false;
    refresh();
  });
  signOutBtn.addEventListener('click', async ()=>{ await sb.auth.signOut(); refresh(); });
  refresh();
</script>
</body>
</html>
