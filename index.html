async function ensurePdfFont(pdf, family){
  const file = FONT_FILE_MAP[family];
  if (!file) { pdf.setFont('helvetica','normal'); return; }
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error('font fetch failed');
    const buf = await res.arrayBuffer();
    let binary = ''; const bytes = new Uint8Array(buf);
    for (let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
    const b64 = btoa(binary);
    const vfsName = file.split('/').pop();
    pdf.addFileToVFS(vfsName, b64);
    pdf.addFont(vfsName, family, 'normal');
    pdf.setFont(family,'normal');
  } catch (e) {
    console.warn('Font embed failed, falling back to helvetica:', family, e);
    pdf.setFont('helvetica','normal');
  }
}
function parseRgb(rgbStr){
  const m = /rgb\((\d+),\s*(\d+),\s*(\d+)\)/i.exec(rgbStr||'');
  return m? [parseInt(m[1],10),parseInt(m[2],10),parseInt(m[3],10)] : [128,128,128];
}
async function makeTextOnlyPdfUrl(r){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();

  await ensurePdfFont(pdf, r.font_family || 'Poppins');

  // preview size (canvas) → production size (PDF) = 5×
  const previewSizePt = Math.max(8, Math.min(300, Number(r.font_size) || 36));
  const fontSizePt = previewSizePt * PREVIEW_SCALE;

  pdf.setFontSize(fontSizePt);
  const [cr,cg,cb] = parseRgb(r.text_color || 'rgb(128,128,128)');
  pdf.setTextColor(cr,cg,cb);

  const text = (r.preview_text || 'Your Text').trim();
  const maxWidth = pageW * 0.9;
  const lines = pdf.splitTextToSize(text, maxWidth);
  const lineHeight = fontSizePt * 1.2;
  const blockHeight = lines.length * lineHeight;
  let startY = (pageH - blockHeight) / 2 + lineHeight * 0.35;
  lines.forEach((line, i) => {
    const w = pdf.getTextWidth(line);
    const x = (pageW - w) / 2;
    pdf.text(line, x, startY + i * lineHeight);
  });

  return pdf.output('bloburl');
}

  const { data, error } = await sb
  .from('orders')
  .select('id, created_at, product_name, preview_text, font_family, font_size, direction, valign, valign_offset, due_date, customer_name, customer_phone, salesperson, filename, text_color, product_path')
  .eq('user_id', user.id)
  .order('created_at', { ascending: false })
  .limit(3);
  if(error){ recentList.textContent = 'Failed to load: ' + error.message; return; }
  if(!data ||!data.length){ recentList.textContent = 'No submissions yet.'; return; }

  recentList.innerHTML = data.map(r => `
    <div style="padding:10px;border:1px solid #eee;border-radius:8px;margin-top:8px" data-id="${r.id}">
      <div style="font-size:13px;color:#666">${fmtDate(r.created_at)}</div>
      <div><b>${r.product_name || '-'}</b> — “${(r.preview_text||'').replace(/</g,'&lt;')}”</div>
      <div class="muted">
        ${r.font_family || 'Poppins'} ${r.font_size || ''} • ${r.direction} • ${r.valign} (${r.valign_offset || 0})
        • Due: ${r.due_date || '-'} • ${r.customer_name || '-'} (${r.customer_phone || '-'}) • Sales: ${r.salesperson || '-'}
      </div>
      <div class="muted">File: ${r.filename || '-'}</div>

      <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <button class="btn secondary dl-png" style="width:auto;padding:6px 10px" title="Save PNG">🖼️ PNG</button>
        <button class="btn secondary dl-pdf" style="width:auto;padding:6px 10px" title="Download PDF">📄 PDF</button>
      </div>

      <div style="margin-top:8px">
        <label class="muted" style="display:block;margin-bottom:4px">Link for text-only</label>
        <div class="inline">
          <input class="textonly-link" type="text" readonly placeholder="Generating link…" style="font-size:12px" />
          <button class="btn secondary copy-link" style="width:auto;padding:8px 12px">Copy link</button>
        </div>
      </div>
    </div>
  `).join('');

  const cards = Array.from(recentList.querySelectorAll('[data-id]'));
  cards.forEach(async (card, i) => {
    const r = data[i];

    // PNG download (re-render from product image + text)
    card.querySelector('.dl-png').addEventListener('click', async () => {
      const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(r.product_path);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = r.canvas_w || 1080; c.height = r.canvas_h || 1350;
        const x = c.getContext('2d');
        const rr = Math.max(c.width / img.naturalWidth, c.height / img.naturalHeight);
        const w = img.naturalWidth * rr, h = img.naturalHeight * rr;
        const ox = (c.width - w) / 2, oy = (c.height - h) / 2;
        x.drawImage(img, ox, oy, w, h);
        const size = r.font_size || 36;
        const y = (r.valign === 'top'? 120 : r.valign === 'bottom'? c.height - 120 : c.height/2) + (r.valign_offset || 0);
        x.save();
        x.fillStyle = r.text_color || TEXT_COLOR;
        x.textAlign = 'center'; x.textBaseline = 'middle';
        x.font = `${size}px ${r.font_family || 'Poppins'}`;
        if (r.direction === 'horizontal') {
          x.fillText(r.preview_text || 'Your Text', c.width/2, y);
        } else {
          x.translate(c.width/2, y);
          x.rotate(r.direction === 'vertical-down'? Math.PI/2 : -Math.PI/2);
          x.fillText(r.preview_text || 'Your Text', 0, 0);
        }
        x.restore();
        const a = document.createElement('a');
        a.download = r.filename || 'preview.png';
        a.href = c.toDataURL('image/png');
        a.click();
      };
      img.src = pub.publicUrl + (pub.publicUrl.includes('?')? '&' : '?') + 'v=' + Date.now();
    });

    // PDF (text-only vector)
    card.querySelector('.dl-pdf').addEventListener('click', async () => {
      try {
        const url = await makeTextOnlyPdfUrl(r);
        const a = document.createElement('a');
        a.href = url; a.target = '_blank'; a.rel = 'noopener';
        a.download = (r.filename || 'preview').replace(/\.png$/i,'') + '.pdf';
        a.click();
      } catch(e){ console.warn(e); alert('PDF failed'); }
    });

    // Link field
    const input = card.querySelector('.textonly-link');
    const btn = card.querySelector('.copy-link');
    try { input.value = await makeTextOnlyPdfUrl(r); }
    catch(e){ console.warn(e); input.placeholder = 'Could not generate link'; btn.disabled = true; }
    btn.addEventListener('click', async () => {
      if (!input.value) return;
      try { await navigator.clipboard.writeText(input.value); btn.textContent = 'Copied!'; setTimeout(()=> btn.textContent = 'Copy link', 1200); }
      catch { input.select(); document.execCommand('copy'); }
    });
  });
}
        
  function clearForm(){
    salesperson.value = '';
    custName.value = '';
    custPhone.value = '';
    dueDate.value = '';
    productSearch.value = '';
    previewText.value = '';
    fontFamilySel.value = 'Poppins';
    fontSize.value = 36; fontSizeVal.textContent = '36';
    directionSel.value = 'horizontal';
    valignSel.value = 'middle';
    valignOffset.value = 0; valignOffsetVal.textContent = '0';
    renderProducts('');
    draw();
    updateSubmitState();
    statusEl.textContent = 'Form cleared.';
    fnameEl.textContent = '';
  }
  clearFormBtn.addEventListener('click', clearForm);

  async function isAdmin(userId){
    const { data } = await sb.from('profiles').select('is_admin').eq('user_id', userId).maybeSingle();
    return!!data?.is_admin;
  }

  async function refresh(){
    const { data: { user } } = await sb.auth.getUser();
    if(user){
      authCard.classList.add('hidden');
      appCard.classList.remove('hidden');
      recentCard.classList.remove('hidden');
      userEmailSpan.textContent = user.email || '';
      await loadProducts();
      if (await isAdmin(user.id)) {
        adminCard.classList.remove('hidden');
      } else {
        adminCard.classList.add('hidden');
      }
      draw();
      await loadRecent();
    }else{
      authCard.classList.remove('hidden');
      appCard.classList.add('hidden');
      adminCard.classList.add('hidden');
      recentCard.classList.add('hidden');
    }
  }

  signInBtn.addEventListener('click', async ()=>{ signInBtn.disabled=true; const { error } = await sb.auth.signInWithPassword({ email: emailInput.value.trim(), password: passwordInput.value }); if(error) alert(error.message); signInBtn.disabled=false; refresh(); });
  signUpBtn.addEventListener('click', async ()=>{ signUpBtn.disabled=true; const { error } = await sb.auth.signUp({ email: emailInput.value.trim(), password: passwordInput.value }); if(error) alert(error.message); else alert('Check your email for confirmation (if enabled).'); signUpBtn.disabled=false; refresh(); });
  signOutBtn.addEventListener('click', async ()=>{ await sb.auth.signOut(); refresh(); });

  uploadBtn.addEventListener('click', async () => {
  const files = fileInput.files;
  if (!files || !files.length) return;

  adminStatus.textContent = 'Uploading…';

  for (const f of files) {
    const ext = (f.name.split('.').pop() || 'bin').toLowerCase();
    const key = `uploads/${crypto.randomUUID()}.${ext}`; // hidden storage key

    const { error: upErr } = await sb.storage.from(BUCKET).upload(key, f, { upsert: false });
    if (upErr) {
      console.error(upErr);
      adminStatus.textContent = 'Upload failed: ' + upErr.message;
      return;
    }

    const { error: dbErr } = await sb.from('files').insert({
      storage_key: key,       // hidden
      display_name: f.name    // what users will see
    });
    if (dbErr) {
      console.error(dbErr);
      adminStatus.textContent = 'DB insert failed: ' + dbErr.message;
      return;
    }
  }

  adminStatus.textContent = 'Done.';
  fileInput.value = '';
  await loadProducts();
});

refreshProducts.addEventListener('click', loadProducts);

  refresh();
</script>
</body>
</html>
